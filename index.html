<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pac-Man X</title>
  <link rel="icon" href="/PacManX.ico" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Menu overlay (shown when not in game) -->
  <div id="menu">
    <!-- Screens are injected here by main.ts -->
  </div>

  <!-- Game canvas (shown during gameplay) -->
  <canvas id="game" style="display:none;"></canvas>

  <!-- Volume control — fixed bottom-left, always visible -->
  <div id="volume-control">
    <span id="volume-icon">&#128264;</span>
    <input id="volume-slider" type="range" min="0" max="100" value="30" step="1" aria-label="Volume" />
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
